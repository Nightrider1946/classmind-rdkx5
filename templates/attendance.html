<!DOCTYPE html>
<html>

<head>

<title>Attendance Running</title>

</head>

<body>

<h1>Attendance Running</h1>

<p>Subject : {{subject}}</p>

<p>Classroom : {{classroom}}</p>

<p>Duration : {{duration}} Seconds</p>

<hr>

<img src="/video_feed" width="900">

<br><br>

<h3>Attendance is being captured...</h3>

<script>

setInterval(function(){

    fetch("/status")
        .then(response => response.json())
        .then(data => {

            if(data.finished){

                window.location.href="/result";

            }

        });

},1000);

</script>
</body>

</html>
